<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골프 레슨 예약 시스템</title>
    <style>
        :root {
            --primary-color: #2d6a4f; /* Green theme for Golf */
            --secondary-color: #40916c;
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --border-color: #dee2e6;
            --danger-color: #e63946;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; }
        
        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 { margin-bottom: 5px; font-size: 1.8rem; }
        .header p { opacity: 0.9; font-size: 0.95rem; }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .date-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
        }

        .date-picker input[type="date"] {
            padding: 10px 15px;
            font-size: 1.1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            color: var(--primary-color);
            font-weight: bold;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .slot-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            position: relative;
            overflow: hidden;
        }

        .slot-card:hover:not(.disabled) {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(45, 106, 79, 0.1);
        }

        .slot-time {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .slot-status {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c757d;
            background: #f8f9fa;
            padding: 4px 0;
            border-radius: 4px;
        }

        .slot-card.disabled {
            background-color: #f8f9fa;
            border-color: #dee2e6;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .slot-card.disabled .slot-time { color: #adb5bd; }
        .slot-card.disabled .slot-status { background: #e9ecef; color: #adb5bd; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal h2 { margin-bottom: 10px; color: var(--primary-color); }
        .modal-time { font-size: 1.1rem; font-weight: bold; color: #495057; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;}
        .form-group input { 
            width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem;
        }
        .form-group input:focus { border-color: var(--primary-color); outline: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn {
            flex: 1; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--secondary-color); }
        .btn-cancel { background: #e9ecef; color: var(--text-color); }
        .btn-cancel:hover { background: #dee2e6; }

        /* Reservations List */
        .my-reservations { margin-top: 20px; }
        .my-reservations h2 { font-size: 1.4rem; margin-bottom: 15px; border-left: 4px solid var(--primary-color); padding-left: 10px;}
        
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; }
        .search-box button { flex: 0 0 100px; }

        .res-list { list-style: none; }
        .res-item {
            background: white; border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .res-info strong { font-size: 1.1rem; color: var(--primary-color); display: block; margin-bottom: 5px; }
        .res-info span { color: #6c757d; }
        .btn-delete { background: white; color: var(--danger-color); border: 1px solid var(--danger-color); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .btn-delete:hover { background: var(--danger-color); color: white; }

        .empty-msg { text-align: center; padding: 40px; color: #adb5bd; background: #f8f9fa; border-radius: 8px; }

        @media (max-width: 600px) {
            .slots-grid { grid-template-columns: repeat(2, 1fr); }
            .res-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .btn-delete { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>⛳ 골프 레슨 예약 시스템</h1>
        <p>각 타임당 최대 2명까지만 예약 가능한 프라이빗 레슨</p>
    </div>

    <div class="container">
        <!-- 예약 달력 & 시간표 -->
        <div class="card">
            <div class="date-picker">
                <label for="dateSelect"><strong>원하시는 날짜를 선택하세요</strong></label>
                <input type="date" id="dateSelect">
            </div>

            <div class="slots-grid" id="slotsGrid">
                <!-- JS에서 슬롯 자동 생성 -->
            </div>
        </div>

        <!-- 나의 예약 조회 -->
        <div class="card my-reservations">
            <h2>📝 예약 조회 및 취소</h2>
            <div class="search-box">
                <input type="text" id="searchPhone" placeholder="예약 시 등록한 연락처 전체 또는 뒷자리 입력" onkeypress="if(event.key === 'Enter') searchReservations()">
                <button class="btn btn-primary" onclick="searchReservations()">조회</button>
            </div>
            <ul class="res-list" id="resList">
                <div class="empty-msg">연락처를 입력하여 예약 내역을 조회해 보세요.</div>
            </ul>
        </div>
    </div>

    <!-- 예약 입력 모달 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>레슨 예약하기</h2>
            <div class="modal-time" id="modalTimeInfo"></div>
            
            <div class="form-group">
                <label for="resName">성함</label>
                <input type="text" id="resName" placeholder="예: 김골프">
            </div>
            <div class="form-group">
                <label for="resPhone">연락처</label>
                <input type="tel" id="resPhone" placeholder="예: 010-1234-5678">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" onclick="submitReservation()">예약 완료</button>
            </div>
        </div>
    </div>

    <script>
        // === 설정 (Constants) ===
        const MAX_CAPACITY = 2; // 타임당 최대 예약 인원
        const START_HOUR = 9;   // 시작 시간 09:00
        const END_HOUR = 21;    // 종료 시간 21:00

        // === 전역 상태 (State) ===
        let selectedDate = '';
        let selectedTime = '';
        // LocalStorage에서 데이터 불러오기 (없으면 빈 객체)
        let reservations = JSON.parse(localStorage.getItem('golf_reservations')) || {};

        // === DOM 요소 ===
        const dateSelect = document.getElementById('dateSelect');
        const slotsGrid = document.getElementById('slotsGrid');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTimeInfo = document.getElementById('modalTimeInfo');
        const resNameInput = document.getElementById('resName');
        const resPhoneInput = document.getElementById('resPhone');
        const resList = document.getElementById('resList');

        // === 초기화 함수 ===
        function init() {
            // 오늘 날짜를 기본값 및 최소 선택 가능 날짜로 설정
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedDate = `${yyyy}-${mm}-${dd}`;
            
            dateSelect.min = formattedDate;
            dateSelect.value = formattedDate;
            selectedDate = formattedDate;

            // 날짜 변경 이벤트
            dateSelect.addEventListener('change', (e) => {
                selectedDate = e.target.value;
                renderSlots();
            });

            renderSlots(); // 최초 화면 렌더링
        }

        // === 30분 단위 시간표 생성 ===
        function generateTimeSlots() {
            const slots = [];
            for (let h = START_HOUR; h <= END_HOUR; h++) {
                const hour = String(h).padStart(2, '0');
                slots.push(`${hour}:00`);
                if (h !== END_HOUR) { // 마지막 시간(21시)은 30분 슬롯 제외
                    slots.push(`${hour}:30`);
                }
            }
            return slots;
        }

        // === 예약 슬롯 화면 렌더링 ===
        function renderSlots() {
            slotsGrid.innerHTML = '';
            const times = generateTimeSlots();
            
            // 선택된 날짜의 예약 데이터 가져오기
            const dateRes = reservations[selectedDate] || {};

            times.forEach(time => {
                // 해당 시간의 예약자 수 확인
                const bookedCount = dateRes[time] ? dateRes[time].length : 0;
                const isFull = bookedCount >= MAX_CAPACITY;

                const card = document.createElement('div');
                card.className = `slot-card ${isFull ? 'disabled' : ''}`;
                
                // 마감 여부에 따른 텍스트 표시
                let statusHtml = '';
                if (isFull) {
                    statusHtml = `<div class="slot-status">예약 마감</div>`;
                } else {
                    statusHtml = `<div class="slot-status" style="color: var(--primary-color);">예약 가능 (${bookedCount}/${MAX_CAPACITY})</div>`;
                }

                card.innerHTML = `
                    <div class="slot-time">${time}</div>
                    ${statusHtml}
                `;

                // 마감이 아니면 클릭 시 모달 열기
                if (!isFull) {
                    card.onclick = () => openModal(time);
                }

                slotsGrid.appendChild(card);
            });
        }

        // === 모달 제어 ===
        function openModal(time) {
            selectedTime = time;
            modalTimeInfo.innerText = `📅 ${selectedDate} ⏰ ${time}`;
            resNameInput.value = '';
            resPhoneInput.value = '';
            modalOverlay.style.display = 'flex';
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
        }

        // === 예약 제출 로직 ===
        function submitReservation() {
            const name = resNameInput.value.trim();
            const phone = resPhoneInput.value.trim();

            if (!name || !phone) {
                alert('성함과 연락처를 모두 입력해주세요.');
                return;
            }

            // 날짜 키가 없으면 생성
            if (!reservations[selectedDate]) {
                reservations[selectedDate] = {};
            }
            // 시간 키가 없으면 생성
            if (!reservations[selectedDate][selectedTime]) {
                reservations[selectedDate][selectedTime] = [];
            }

            // 인원 재확인 (동시 예약 방지 로직)
            if (reservations[selectedDate][selectedTime].length >= MAX_CAPACITY) {
                alert('죄송합니다. 처리 중 해당 시간이 마감되었습니다.');
                closeModal();
                renderSlots();
                return;
            }

            // 예약 데이터 추가
            reservations[selectedDate][selectedTime].push({
                id: Date.now().toString(), // 고유 ID
                name: name,
                phone: phone
            });

            // LocalStorage에 저장하여 DB 역할 수행
            localStorage.setItem('golf_reservations', JSON.stringify(reservations));
            
            alert('✅ 예약이 완료되었습니다!');
            closeModal();
            renderSlots(); // 예약 후 화면 갱신
            
            // 방금 예약한 번호로 자동 조회 (편의성)
            document.getElementById('searchPhone').value = phone;
            searchReservations();
        }

        // === 예약 조회 로직 ===
        function searchReservations() {
            const searchTerm = document.getElementById('searchPhone').value.trim();
            resList.innerHTML = '';

            if (searchTerm.length < 4) {
                alert('정확한 조회를 위해 연락처 뒷자리(4자리 이상)를 입력해주세요.');
                return;
            }

            let found = false;

            // 전체 예약 데이터를 순회하며 검색
            for (const date in reservations) {
                for (const time in reservations[date]) {
                    const list = reservations[date][time];
                    list.forEach(res => {
                        // 연락처에 검색어가 포함되어 있으면 출력
                        if (res.phone.includes(searchTerm)) {
                            found = true;
                            const li = document.createElement('li');
                            li.className = 'res-item';
                            li.innerHTML = `
                                <div class="res-info">
                                    <strong>${date} ${time}</strong>
                                    <span>👤 ${res.name} | 📞 ${res.phone}</span>
                                </div>
                                <button class="btn-delete" onclick="cancelReservation('${date}', '${time}', '${res.id}')">예약 취소</button>
                            `;
                            resList.appendChild(li);
                        }
                    });
                }
            }

            if (!found) {
                resList.innerHTML = '<div class="empty-msg">일치하는 예약 내역이 없습니다.</div>';
            }
        }

        // === 예약 취소 로직 ===
        function cancelReservation(date, time, resId) {
            if (confirm('선택하신 예약을 정말로 취소하시겠습니까?')) {
                const list = reservations[date][time];
                // 해당 ID를 제외한 나머지로 배열 갱신
                reservations[date][time] = list.filter(res => res.id !== resId);
                
                // LocalStorage 저장
                localStorage.setItem('golf_reservations', JSON.stringify(reservations));
                alert('취소 처리가 완료되었습니다.');
                
                // 리스트 및 슬롯 화면 갱신
                searchReservations(); 
                if (date === selectedDate) {
                    renderSlots();
                }
            }
        }

        // 앱 실행
        init();
    </script>
</body>
</html>
